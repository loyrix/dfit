openapi: 3.1.0
info:
  title: LogMyPlate API
  version: 0.0.0
  description: |
    Public HTTP API for LogMyPlate, a camera-first nutrition journal.

    LogMyPlate is anonymous-first. Most user-scoped endpoints resolve identity in this order:
    1. `Authorization: Bearer <token>` for a signed-in session
    2. `x-logmyplate-install-id` for an anonymous device profile
    3. a fallback demo profile when neither is present

    The current backend reads authentication context but does not yet enforce a hard
    authenticated-only boundary on most endpoints. This document therefore marks those
    endpoints as supporting optional identity rather than requiring login.

    Every mutating endpoint except `/v1/auth/*`, `/v1/devices/push-token`, and account lifecycle
    endpoints requires an `Idempotency-Key` header.
servers:
  - url: https://logmyplate-api.vercel.app
    description: Production
  - url: http://127.0.0.1:4000
    description: Local development

tags:
  - name: System
  - name: Bootstrap
  - name: Foods
  - name: Auth
  - name: Profile
  - name: Journal
  - name: Meals
  - name: Scans
  - name: Ads
  - name: Devices
  - name: Admin
  - name: Internal

paths:
  /:
    get:
      tags: [System]
      summary: Service root
      description: Returns a minimal service identity payload used for quick environment checks.
      responses:
        "200":
          description: Service is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatus"
              examples:
                default:
                  value:
                    ok: true
                    service: logmyplate-api
                    version: 0.0.0

  /health:
    get:
      tags: [System]
      summary: Health check
      description: Returns a lightweight liveness response for monitoring and deployment checks.
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatus"

  /v1/config:
    get:
      tags: [System]
      summary: Get app configuration
      description: Returns client-facing feature flags and scan limits used to configure the app shell.
      responses:
        "200":
          description: Current app configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppConfig"

  /admin/engagement-policy:
    get:
      tags: [Admin]
      summary: Get engagement policy
      description: Returns the backoffice-managed growth policy used by Firebase Analytics, review prompts, interstitial ads, FCM push reminders, and streaks.
      security:
        - adminBasic: []
      responses:
        "200":
          description: Current engagement policy.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/EngagementPolicy"
        "401":
          description: Admin credentials are missing or invalid.
        "503":
          description: Database is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
    put:
      tags: [Admin]
      summary: Update engagement policy
      description: Replaces the backoffice-managed engagement policy and writes an admin audit log entry with the required reason.
      security:
        - adminBasic: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngagementPolicyUpdateRequest"
      responses:
        "200":
          description: Updated engagement policy.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/EngagementPolicy"
        "400":
          description: Invalid engagement policy payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Admin credentials are missing or invalid.
        "503":
          description: Database is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"

  /admin/push-notifications/send:
    post:
      tags: [Admin]
      summary: Send manual FCM push notification
      description: Sends a server-side Firebase Cloud Messaging notification to a profile, install, or guarded broadcast target using active registered device tokens.
      security:
        - adminBasic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSendPushNotificationRequest"
      responses:
        "200":
          description: Push delivery attempt summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSendPushNotificationResponse"
        "400":
          description: Invalid push notification payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Admin credentials are missing or invalid.
        "404":
          description: No active registered push tokens matched the requested target.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "503":
          description: Database or Firebase Cloud Messaging server credentials are unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /internal/cron/push-reminders:
    get:
      tags: [Internal]
      summary: Run scheduled FCM push reminders
      description: |
        Internal scheduler endpoint that evaluates the Growth Controls notification policy and sends
        due FCM meal reminders. Requires `Authorization: Bearer <CRON_SECRET>`.
      security:
        - cronBearer: []
      parameters:
        - name: dryRun
          in: query
          required: false
          description: When true, evaluates eligibility and records a run without sending FCM notifications.
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          required: false
          description: Maximum number of token-owning profiles to evaluate in this run.
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 500
      responses:
        "200":
          description: Scheduled reminder run summary.
          content:
            application/json:
              schema:
                type: object
                required: [reminders]
                properties:
                  reminders:
                    $ref: "#/components/schemas/ScheduledPushReminderSummary"
        "401":
          description: Missing or invalid cron bearer secret.
        "503":
          description: Cron secret, database, or Firebase Cloud Messaging server credentials are unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/app/bootstrap:
    get:
      tags: [Bootstrap]
      summary: Bootstrap the app
      description: |
        Returns the initial payload needed to render the signed-in or anonymous app:
        current profile, scan quota, today's journal, health target, and lightweight weekly summary.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/PlatformHeader"
        - $ref: "#/components/parameters/AppVersionHeader"
        - $ref: "#/components/parameters/AppBuildHeader"
        - $ref: "#/components/parameters/LocaleHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - $ref: "#/components/parameters/TimezoneHeader"
      responses:
        "200":
          description: Initial application state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"

  /v1/devices/push-token:
    put:
      tags: [Devices]
      summary: Register device push token
      description: Idempotently registers the current mobile install's FCM token so backend jobs and admin actions can send server-side push notifications. Mobile apps call this only when remote notifications are enabled by engagement policy and the user has granted push permission.
      security:
        - bearerAuth: []
          installId: []
        - installId: []
      parameters:
        - $ref: "#/components/parameters/PlatformHeader"
        - $ref: "#/components/parameters/AppVersionHeader"
        - $ref: "#/components/parameters/AppBuildHeader"
        - $ref: "#/components/parameters/LocaleHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - $ref: "#/components/parameters/TimezoneHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenRequest"
      responses:
        "200":
          description: Push token registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterPushTokenResponse"
        "400":
          description: Invalid push token payload or missing install identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/foods:
    get:
      tags: [Foods]
      summary: Search foods
      description: Searches the food catalog by name or alias.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - name: q
          in: query
          required: false
          description: Search phrase. Empty string returns repository-defined default matches.
          schema:
            type: string
          example: dosa
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodSearchResponse"

  /v1/foods/{id}:
    get:
      tags: [Foods]
      summary: Get food details
      description: Returns one canonical food record by ID.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/FoodIdPath"
      responses:
        "200":
          description: Food record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Food"
        "404":
          $ref: "#/components/responses/FoodNotFound"

  /v1/foods/{id}/units:
    get:
      tags: [Foods]
      summary: Get food portion units
      description: Returns supported portion conversions for a food item.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/FoodIdPath"
      responses:
        "200":
          description: Portion conversions for the food.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodUnitsResponse"
        "404":
          $ref: "#/components/responses/FoodNotFound"

  /v1/auth/anonymous:
    post:
      tags: [Auth]
      summary: Start anonymous session
      description: |
        Returns the current anonymous profile and a development anonymous access token.
        The device can be associated through `x-logmyplate-install-id`.
      security:
        - installId: []
        - {}
      responses:
        "200":
          description: Anonymous session context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnonymousAuthResponse"

  /v1/auth/email/signup:
    post:
      tags: [Auth]
      summary: Sign up with email
      description: |
        Creates an email account. If the current user is anonymous, the account is linked
        to that anonymous profile; otherwise a separate email profile is created.
      security:
        - installId: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailAuthRequest"
            examples:
              default:
                value:
                  email: user@example.com
                  password: secret123
      responses:
        "201":
          description: Account created and session issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSession"
        "400":
          $ref: "#/components/responses/InvalidEmailAuth"
        "409":
          description: Email is already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/auth/email/login:
    post:
      tags: [Auth]
      summary: Log in with email
      description: |
        Authenticates an email account and returns a session. If the caller currently has
        an anonymous profile on the device, its data may be merged into the account profile.
      security:
        - installId: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailAuthRequest"
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSession"
        "400":
          $ref: "#/components/responses/InvalidEmailAuth"
        "401":
          description: Password is incorrect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "404":
          description: Account does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "403":
          description: Account is deactivated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/auth/email/password-reset/request:
    post:
      tags: [Auth]
      summary: Request password reset code
      description: |
        Requests a short-lived password reset code. The response is always accepted
        for valid email-shaped input so account existence is not exposed.
      security:
        - installId: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "202":
          description: Password reset request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        "400":
          description: Invalid password reset request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /v1/auth/email/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Reset password with code
      description: |
        Confirms a password reset code, sets the new password, revokes prior sessions,
        and returns a fresh account session.
      security:
        - installId: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirmRequest"
      responses:
        "200":
          description: Password reset and session issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSession"
        "400":
          description: Invalid or expired reset code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/auth/oauth:
    post:
      tags: [Auth]
      summary: Sign in with Google or Apple
      description: |
        Verifies a Google or Apple ID token, links the provider identity to the
        current anonymous profile when present, and returns a LogMyPlate session.
      security:
        - installId: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthAuthRequest"
            examples:
              google:
                value:
                  provider: google
                  idToken: eyJhbGciOiJSUzI1NiIs...
              apple:
                value:
                  provider: apple
                  idToken: eyJhbGciOiJSUzI1NiIs...
                  authorizationCode: c0de
                  nonce: random-nonce
      responses:
        "200":
          description: Provider verified and session issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSession"
        "400":
          description: Request body is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithIssues"
        "401":
          description: Provider token is invalid or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "409":
          description: Provider or email is already linked to another account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "503":
          description: Provider verification is temporarily unavailable or not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: |
        Revokes the bearer session when provided. The endpoint is intentionally tolerant:
        if no token is supplied, it still returns success.
      security:
        - bearerAuth: []
        - {}
      responses:
        "204":
          description: Session revoked or no active session present.

  /v1/profiles/me:
    get:
      tags: [Profile]
      summary: Get current profile
      description: Returns the current profile resolved from bearer token, install ID, or fallback profile.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/PlatformHeader"
        - $ref: "#/components/parameters/LocaleHeader"
        - $ref: "#/components/parameters/RegionHeader"
        - $ref: "#/components/parameters/TimezoneHeader"
      responses:
        "200":
          description: Current profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileEnvelope"
    delete:
      tags: [Profile]
      summary: Delete current profile
      description: |
        Permanently deletes the signed-in account profile, meals, targets,
        account credentials, sessions, and stored meal photos. Scan AI analytics
        are retained for business reporting with profile, hint, image, and credit
        fields unlinked from the user. Anonymous profiles cannot call this endpoint.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Profile and stored data deleted.
        "401":
          description: Account required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "502":
          description: Stored photos could not be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "503":
          description: Stored photo deletion is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/profiles/me/deactivate:
    post:
      tags: [Profile]
      summary: Deactivate current profile
      description: |
        Deactivates the signed-in profile and revokes its sessions while leaving
        stored meals and photos intact for possible support-assisted recovery.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Profile deactivated.
        "401":
          description: Account required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/profiles/me/health:
    get:
      tags: [Profile]
      summary: Get current health target
      description: Returns the BMI-derived daily calorie target for the current account when configured.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current health target, if configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthTargetEnvelope"
    put:
      tags: [Profile]
      summary: Save current health target
      description: Calculates and stores BMI, BMR, and daily calorie target from account health inputs.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthTargetRequest"
      responses:
        "200":
          description: Saved health target.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthTargetEnvelope"
        "401":
          description: Account required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/journal/today:
    get:
      tags: [Journal]
      summary: Get today's journal
      description: Returns today's meals and nutrition totals for the current profile.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      responses:
        "200":
          description: Today's journal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayJournalResponse"

  /v1/journal/range:
    get:
      tags: [Journal]
      summary: Get journal range
      description: Returns a rolling journal window plus aggregate summary metrics.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - name: days
          in: query
          required: false
          description: Number of days in the returned window.
          schema:
            type: integer
            minimum: 1
            maximum: 31
            default: 7
        - name: weekOffset
          in: query
          required: false
          description: Number of 7-day windows to move backward from the current week.
          schema:
            type: integer
            minimum: 0
            maximum: 104
            default: 0
      responses:
        "200":
          description: Journal range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalRangeResponse"
        "400":
          description: Invalid range query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /v1/journal/weeks:
    get:
      tags: [Journal]
      summary: List available journal weeks
      description: Returns week buckets that contain tracked meals, plus the current week.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      responses:
        "200":
          description: Available journal weeks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalWeeksResponse"

  /v1/meals:
    post:
      tags: [Meals]
      summary: Create meal
      description: Creates a manually logged meal for the current profile.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMealRequest"
      responses:
        "201":
          description: Meal created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"
        "400":
          description: Invalid meal payload or missing idempotency key.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationError"
                  - $ref: "#/components/schemas/ErrorWithMessage"

  /v1/meals/{id}:
    get:
      tags: [Meals]
      summary: Get meal
      description: Returns one meal belonging to the current profile.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/MealIdPath"
      responses:
        "200":
          description: Meal found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"
        "404":
          $ref: "#/components/responses/MealNotFound"
    patch:
      tags: [Meals]
      summary: Update meal
      description: Replaces editable meal details while preserving the original logged timestamp.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/MealIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMealRequest"
      responses:
        "200":
          description: Meal updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"
        "400":
          description: Invalid meal update or missing idempotency key.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationError"
                  - $ref: "#/components/schemas/ErrorWithMessage"
        "404":
          $ref: "#/components/responses/MealNotFound"
    delete:
      tags: [Meals]
      summary: Delete meal
      description: Deletes a meal. If the meal has a stored image, the image is deleted first.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/MealIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      responses:
        "204":
          description: Meal deleted.
        "400":
          description: Missing idempotency key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "404":
          $ref: "#/components/responses/MealNotFound"
        "503":
          description: Meal image storage is not configured, so delete cannot safely complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "502":
          description: Stored meal image could not be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/quota:
    get:
      tags: [Scans]
      summary: Get scan quota
      description: Returns remaining free, rewarded, and premium scan credits for the current profile.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      responses:
        "200":
          description: Current quota.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quota"

  /v1/ads/rewarded/complete:
    post:
      tags: [Ads]
      summary: Complete rewarded ad
      description: Records a completed rewarded ad. One completed rewarded ad grants one rewarded scan credit, capped at five rewarded scans per day. Production can require a matching AdMob server-side verification token before granting.
      security:
        - bearerAuth: []
          installId: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteRewardedAdRequest"
      responses:
        "200":
          description: Rewarded ad progress and current scan quota.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardedAdCreditResponse"
        "400":
          description: Invalid rewarded ad payload or missing idempotency key.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationError"
                  - $ref: "#/components/schemas/ErrorWithMessage"
        "401":
          description: Account is required before rewarded scan unlocks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"
        "409":
          description: Rewarded ad server-side verification has not arrived yet.

  /v1/ads/rewarded/ssv:
    get:
      tags: [Ads]
      summary: AdMob rewarded SSV callback
      description: Receives and verifies Google AdMob rewarded server-side verification callbacks. Configure this URL in the AdMob rewarded ad unit.
      security: []
      parameters:
        - in: query
          name: ad_network
          schema:
            type: string
        - in: query
          name: ad_unit
          schema:
            type: string
        - in: query
          name: custom_data
          schema:
            type: string
        - in: query
          name: key_id
          required: true
          schema:
            type: string
        - in: query
          name: reward_amount
          schema:
            type: integer
        - in: query
          name: reward_item
          schema:
            type: string
        - in: query
          name: signature
          required: true
          schema:
            type: string
        - in: query
          name: timestamp
          schema:
            type: string
        - in: query
          name: transaction_id
          required: true
          schema:
            type: string
        - in: query
          name: user_id
          schema:
            type: string
      responses:
        "200":
          description: Callback accepted.
        "400":
          description: Callback signature or payload rejected.
        "503":
          description: Verification key fetch failed; AdMob should retry.

  /v1/scans/prepare:
    post:
      tags: [Scans]
      summary: Prepare scan session
      description: Creates a scan session before image analysis begins.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      responses:
        "201":
          description: Scan session prepared.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrepareScanResponse"
        "400":
          description: Missing idempotency key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithMessage"

  /v1/scans/{id}/analyze:
    post:
      tags: [Scans]
      summary: Analyze scan
      description: |
        Runs food-photo analysis for a prepared scan. The caller may include a short human hint
        and an image. On successful food detection, the scan consumes one available credit and
        returns editable analysis output for review. If no food is detected, the AI run is logged
        but no scan credit is consumed.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ScanIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeScanRequest"
      responses:
        "200":
          description: Analysis ready for review. If the scan was already analyzed, the cached analysis is returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeScanResponse"
        "400":
          description: Invalid scan image payload or missing idempotency key.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationError"
                  - $ref: "#/components/schemas/ErrorWithMessage"
        "402":
          description: No available scan credit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanCreditRequiredError"
        "422":
          description: No visible food or drink was detected in the image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProviderError"
        "429":
          description: Too many repeated non-food scan attempts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProviderError"
        "404":
          $ref: "#/components/responses/ScanNotFound"
        "502":
          description: AI provider failed or returned invalid output.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProviderError"
        "503":
          description: AI provider is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProviderError"
        "504":
          description: AI provider timed out.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProviderError"

  /v1/scans/{id}/confirm:
    post:
      tags: [Scans]
      summary: Confirm scan
      description: |
        Persists the reviewed AI result as a meal. If an image is supplied and image storage
        is configured, the image is uploaded and attached to the resulting meal.
      security:
        - bearerAuth: []
        - installId: []
        - {}
      parameters:
        - $ref: "#/components/parameters/ScanIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmScanRequest"
      responses:
        "201":
          description: Scan confirmed and meal created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmScanResponse"
        "400":
          description: Invalid confirmation payload, image size mismatch, or missing idempotency key.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationError"
                  - $ref: "#/components/schemas/SimpleError"
                  - $ref: "#/components/schemas/ErrorWithMessage"
        "404":
          $ref: "#/components/responses/ScanNotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque session token
      description: Optional signed-in session token.
    installId:
      type: apiKey
      in: header
      name: x-logmyplate-install-id
      description: Optional anonymous device identifier used to resolve or create a device profile.
    adminBasic:
      type: http
      scheme: basic
      description: Admin dashboard basic authentication.
    cronBearer:
      type: http
      scheme: bearer
      bearerFormat: shared cron secret
      description: Internal scheduler bearer secret configured with `CRON_SECRET`.

  parameters:
    FoodIdPath:
      name: id
      in: path
      required: true
      description: Food ID.
      schema:
        type: string
    MealIdPath:
      name: id
      in: path
      required: true
      description: Meal ID.
      schema:
        type: string
    ScanIdPath:
      name: id
      in: path
      required: true
      description: Scan session ID.
      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      description: Required for mutating requests outside `/v1/auth/*` and account lifecycle endpoints; repeated keys replay the cached response.
      schema:
        type: string
        minLength: 1
      example: 5f8b5b42-1844-4d12-bf3e-0f4208652f0b
    PlatformHeader:
      name: x-logmyplate-platform
      in: header
      required: false
      schema:
        type: string
        enum: [ios, android]
    AppVersionHeader:
      name: x-logmyplate-app-version
      in: header
      required: false
      description: Installed mobile app version name, such as `1.0.0`.
      schema:
        type: string
      example: 1.0.0
    AppBuildHeader:
      name: x-logmyplate-app-build
      in: header
      required: false
      description: Installed mobile app build number used for optional and mandatory update prompts.
      schema:
        type: integer
        minimum: 0
      example: 12
    LocaleHeader:
      name: x-logmyplate-locale
      in: header
      required: false
      schema:
        type: string
      example: en-IN
    RegionHeader:
      name: x-logmyplate-region
      in: header
      required: false
      schema:
        type: string
      example: IN
    TimezoneHeader:
      name: x-logmyplate-timezone
      in: header
      required: false
      schema:
        type: string
      example: Asia/Kolkata

  responses:
    FoodNotFound:
      description: Food was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleError"
          examples:
            default:
              value:
                error: food_not_found
    MealNotFound:
      description: Meal was not found for the current profile.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleError"
          examples:
            default:
              value:
                error: meal_not_found
    ScanNotFound:
      description: Scan was not found for the current profile.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SimpleError"
          examples:
            default:
              value:
                error: scan_not_found
    InvalidEmailAuth:
      description: Invalid email or password payload.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

  schemas:
    ServiceStatus:
      type: object
      required: [ok, service, version]
      properties:
        ok:
          type: boolean
        service:
          type: string
        version:
          type: string

    AppConfig:
      type: object
      required: [appName, scanLimits, features]
      properties:
        appName:
          type: string
        scanLimits:
          type: object
          required: [freeLifetime, rewardedCap, launchTotalCap, rewardedAdsPerScan, rewardedPeriod]
          properties:
            freeLifetime:
              type: integer
            rewardedCap:
              type: integer
            launchTotalCap:
              type: integer
            rewardedAdsPerScan:
              type: integer
            rewardedPeriod:
              type: string
              enum: [day]
        features:
          type: object
          required: [aiProvider, imageStorage, noImageStorage, accountLink, premium]
          properties:
            aiProvider:
              type: string
              enum: [mock, openai, gemini]
            imageStorage:
              type: boolean
            noImageStorage:
              type: boolean
            accountLink:
              type: boolean
            premium:
              type: boolean

    Profile:
      type: object
      required: [id, authMethod, timezone, createdAt]
      properties:
        id:
          type: string
        authMethod:
          type: string
          enum: [anonymous, apple, google, email]
        email:
          type: string
          format: email
        timezone:
          type: string
        linkedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    ProfileEnvelope:
      type: object
      required: [profile]
      properties:
        profile:
          $ref: "#/components/schemas/Profile"

    AccountSession:
      type: object
      required: [profile, accessToken, expiresAt]
      properties:
        profile:
          $ref: "#/components/schemas/Profile"
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time

    AnonymousAuthResponse:
      type: object
      required: [profile, accessToken]
      properties:
        profile:
          $ref: "#/components/schemas/Profile"
        accessToken:
          type: string

    HealthTargetRequest:
      type: object
      required: [heightCm, weightKg, ageYears, sex, activityLevel, goal]
      properties:
        heightCm:
          type: number
          minimum: 90
          maximum: 250
        weightKg:
          type: number
          minimum: 25
          maximum: 300
        ageYears:
          type: integer
          minimum: 18
          maximum: 90
        sex:
          type: string
          enum: [female, male, not_specified]
        activityLevel:
          type: string
          enum: [sedentary, light, moderate, active]
        goal:
          type: string
          enum: [maintain, lose_gently, gain_gently]

    HealthTarget:
      allOf:
        - $ref: "#/components/schemas/HealthTargetRequest"
        - type: object
          required:
            - profileId
            - bmi
            - bmiCategory
            - bmrCalories
            - dailyCalorieTarget
            - formula
            - createdAt
            - updatedAt
          properties:
            profileId:
              type: string
            bmi:
              type: number
              minimum: 0
            bmiCategory:
              type: string
              enum: [underweight, healthy, overweight, obese]
            bmrCalories:
              type: integer
              minimum: 1
            dailyCalorieTarget:
              type: integer
              minimum: 1
            formula:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    HealthTargetEnvelope:
      type: object
      properties:
        healthTarget:
          nullable: true
          $ref: "#/components/schemas/HealthTarget"

    EmailAuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 6
          maxLength: 128

    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 254

    PasswordResetConfirmRequest:
      type: object
      required: [email, code, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        code:
          type: string
          pattern: "^\\d{6}$"
        password:
          type: string
          minLength: 6
          maxLength: 128

    AcceptedResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted]

    OAuthAuthRequest:
      type: object
      required: [provider, idToken]
      properties:
        provider:
          type: string
          enum: [apple, google]
        idToken:
          type: string
          minLength: 20
        authorizationCode:
          type: string
        nonce:
          type: string
          maxLength: 256
        displayName:
          type: string
          maxLength: 160

    MacroTotals:
      type: object
      required: [calories, proteinG, carbsG, fatG]
      properties:
        calories:
          type: number
          minimum: 0
        proteinG:
          type: number
          minimum: 0
        carbsG:
          type: number
          minimum: 0
        fatG:
          type: number
          minimum: 0
        fiberG:
          type: number
          minimum: 0
        sugarG:
          type: number
          minimum: 0
        sodiumMg:
          type: number
          minimum: 0

    PortionUnit:
      type: string
      enum:
        - gram
        - ml
        - piece
        - serving
        - bowl
        - katori
        - cup
        - tablespoon
        - teaspoon
        - ladle
        - roti
        - idli
        - dosa
        - slice
        - scoop
        - small
        - medium
        - large

    PortionConversion:
      type: object
      required: [unit, grams, confidence]
      properties:
        unit:
          $ref: "#/components/schemas/PortionUnit"
        grams:
          type: number
          minimum: 0
        confidence:
          type: number
          minimum: 0
          maximum: 1

    Food:
      type: object
      required: [id, canonicalName, region, aliases, source, nutritionPer100g, portions]
      properties:
        id:
          type: string
        canonicalName:
          type: string
        region:
          type: string
          enum: [IN, GLOBAL]
        aliases:
          type: array
          items:
            type: string
        source:
          type: string
        nutritionPer100g:
          $ref: "#/components/schemas/MacroTotals"
        portions:
          type: array
          items:
            $ref: "#/components/schemas/PortionConversion"

    FoodSearchResult:
      allOf:
        - $ref: "#/components/schemas/Food"
        - type: object
          required: [score]
          properties:
            matchedAlias:
              type: string
            score:
              type: number

    FoodSearchResponse:
      type: object
      required: [query, results]
      properties:
        query:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/FoodSearchResult"

    FoodUnitsResponse:
      type: object
      required: [foodId, portions]
      properties:
        foodId:
          type: string
        portions:
          type: array
          items:
            $ref: "#/components/schemas/PortionConversion"

    MealItem:
      type: object
      required: [id, displayName, quantity, unit, grams, nutrition, userEdited]
      properties:
        id:
          type: string
        foodId:
          type: string
        displayName:
          type: string
        quantity:
          type: number
          exclusiveMinimum: 0
        unit:
          $ref: "#/components/schemas/PortionUnit"
        grams:
          type: number
          minimum: 0
        nutrition:
          $ref: "#/components/schemas/MacroTotals"
        userEdited:
          type: boolean

    MealImage:
      type: object
      required: [url, mimeType, byteSize]
      properties:
        url:
          type: string
          format: uri
        mimeType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
        byteSize:
          type: integer
          minimum: 1
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1

    Meal:
      type: object
      required: [id, profileId, mealType, title, loggedAt, items, totals]
      properties:
        id:
          type: string
        profileId:
          type: string
        mealType:
          type: string
          enum: [breakfast, lunch, snack, dinner]
        title:
          type: string
        loggedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/MealItem"
        totals:
          $ref: "#/components/schemas/MacroTotals"
        image:
          $ref: "#/components/schemas/MealImage"

    CreateMealItem:
      type: object
      required: [displayName, quantity, unit, grams, nutrition]
      properties:
        foodId:
          type: string
        displayName:
          type: string
        quantity:
          type: number
          exclusiveMinimum: 0
        unit:
          $ref: "#/components/schemas/PortionUnit"
        grams:
          type: number
          minimum: 0
        nutrition:
          $ref: "#/components/schemas/MacroTotals"
        userEdited:
          type: boolean
          default: false

    CreateMealRequest:
      type: object
      required: [mealType, title, items]
      properties:
        mealType:
          type: string
          enum: [breakfast, lunch, snack, dinner]
        title:
          type: string
        loggedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateMealItem"

    UpdateMealRequest:
      type: object
      required: [mealType, title, items]
      properties:
        mealType:
          type: string
          enum: [breakfast, lunch, snack, dinner]
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateMealItem"

    TodayJournalResponse:
      type: object
      required: [date, timezone, totals, meals]
      properties:
        date:
          type: string
        timezone:
          type: string
        totals:
          $ref: "#/components/schemas/MacroTotals"
        target:
          $ref: "#/components/schemas/MacroTotals"
        meals:
          type: array
          items:
            $ref: "#/components/schemas/Meal"

    JournalDay:
      type: object
      required: [date, mealCount, totals, meals]
      properties:
        date:
          type: string
        mealCount:
          type: integer
          minimum: 0
        totals:
          $ref: "#/components/schemas/MacroTotals"
        meals:
          type: array
          items:
            $ref: "#/components/schemas/Meal"

    JournalRangeSummary:
      type: object
      required:
        - windowDays
        - activeDays
        - mealCount
        - totals
        - trackedDayAverage
        - calendarDayAverage
      properties:
        windowDays:
          type: integer
          minimum: 1
        activeDays:
          type: integer
          minimum: 0
        mealCount:
          type: integer
          minimum: 0
        totals:
          $ref: "#/components/schemas/MacroTotals"
        trackedDayAverage:
          $ref: "#/components/schemas/MacroTotals"
        calendarDayAverage:
          $ref: "#/components/schemas/MacroTotals"

    JournalRangeResponse:
      type: object
      required: [startDate, endDate, timezone, days, summary]
      properties:
        startDate:
          type: string
        endDate:
          type: string
        timezone:
          type: string
        target:
          $ref: "#/components/schemas/MacroTotals"
        days:
          type: array
          items:
            $ref: "#/components/schemas/JournalDay"
        summary:
          $ref: "#/components/schemas/JournalRangeSummary"

    JournalWeekOption:
      type: object
      required: [weekOffset, startDate, endDate, activeDays]
      properties:
        weekOffset:
          type: integer
          minimum: 0
        startDate:
          type: string
        endDate:
          type: string
        activeDays:
          type: integer
          minimum: 0

    JournalWeeksResponse:
      type: object
      required: [weeks]
      properties:
        weeks:
          type: array
          items:
            $ref: "#/components/schemas/JournalWeekOption"

    Quota:
      type: object
      required: [freeRemaining, rewardedRemaining, premiumRemaining]
      properties:
        freeRemaining:
          type: integer
          minimum: 0
        rewardedRemaining:
          type: integer
          minimum: 0
        premiumRemaining:
          type: integer
          minimum: 0

    CompleteRewardedAdRequest:
      type: object
      required: [provider, placement]
      properties:
        provider:
          type: string
          enum: [admob]
        placement:
          type: string
          enum: [scan_unlock]
        adUnitId:
          type: string
        transactionId:
          type: string
        verificationToken:
          type: string
          minLength: 16
          maxLength: 160
        rewardType:
          type: string
        rewardAmount:
          type: integer
          minimum: 0

    RewardedAdCreditResponse:
      type: object
      required:
        - grantedScan
        - adsWatchedToday
        - adsNeededForNextScan
        - scansGrantedToday
        - dailyScanLimit
        - adsPerScan
        - quota
      properties:
        grantedScan:
          type: boolean
        adsWatchedToday:
          type: integer
          minimum: 0
        adsNeededForNextScan:
          type: integer
          minimum: 0
        scansGrantedToday:
          type: integer
          minimum: 0
        dailyScanLimit:
          type: integer
          minimum: 1
        adsPerScan:
          type: integer
          minimum: 1
        quota:
          $ref: "#/components/schemas/Quota"

    PrepareScanResponse:
      type: object
      required: [scanId, status, quota]
      properties:
        scanId:
          type: string
        status:
          type: string
          enum: [prepared, analyzing, needs_ad, ready_for_review, confirmed, cancelled, failed]
        quota:
          $ref: "#/components/schemas/Quota"

    ScanImage:
      type: object
      required: [mimeType, base64, byteSize]
      properties:
        mimeType:
          type: string
          enum: [image/jpeg, image/png, image/webp]
        base64:
          type: string
          minLength: 1
          maxLength: 8000000
          description: Base64-encoded image bytes.
        byteSize:
          type: integer
          minimum: 1
          maximum: 6000000

    AnalyzeScanRequest:
      type: object
      required: [hint]
      properties:
        hint:
          type: string
          minLength: 1
          maxLength: 280
          description: Optional human clue about the plate; current schema requires a non-empty value.
        image:
          $ref: "#/components/schemas/ScanImage"

    AnalyzedMealItem:
      type: object
      required:
        - id
        - name
        - aliases
        - quantity
        - unit
        - estimatedGrams
        - preparation
        - confidence
        - nutrition
      properties:
        id:
          type: string
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        quantity:
          type: number
          exclusiveMinimum: 0
        unit:
          $ref: "#/components/schemas/PortionUnit"
        estimatedGrams:
          type: number
          minimum: 0
        preparation:
          type: string
          enum: [home, restaurant, packaged, unknown]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        nutrition:
          $ref: "#/components/schemas/MacroTotals"

    AnalyzeScanResponse:
      type: object
      required: [scanId, status, mealType, mealName, detectedLanguage, items, totals]
      properties:
        scanId:
          type: string
        status:
          type: string
          const: ready_for_review
        mealType:
          type: string
          enum: [breakfast, lunch, snack, dinner]
        mealName:
          type: string
        detectedLanguage:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/AnalyzedMealItem"
        totals:
          $ref: "#/components/schemas/MacroTotals"

    ConfirmScanItem:
      type: object
      required: [name, quantity, unit, estimatedGrams, nutrition]
      properties:
        name:
          type: string
        quantity:
          type: number
          exclusiveMinimum: 0
        unit:
          $ref: "#/components/schemas/PortionUnit"
        estimatedGrams:
          type: number
          minimum: 0
        nutrition:
          $ref: "#/components/schemas/MacroTotals"

    ConfirmScanRequest:
      type: object
      required: [mealType, title, items]
      properties:
        mealType:
          type: string
          enum: [breakfast, lunch, snack, dinner]
        title:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConfirmScanItem"
        image:
          $ref: "#/components/schemas/ScanImage"

    ConfirmScanResponse:
      type: object
      required: [mealId, totals, meal]
      properties:
        mealId:
          type: string
        totals:
          $ref: "#/components/schemas/MacroTotals"
        meal:
          $ref: "#/components/schemas/Meal"

    BootstrapResponse:
      type: object
      required: [serverTime, profile, updatePolicy, quota, today, weeklySummary]
      properties:
        serverTime:
          type: string
          format: date-time
        profile:
          $ref: "#/components/schemas/Profile"
        healthTarget:
          nullable: true
          $ref: "#/components/schemas/HealthTarget"
        updatePolicy:
          $ref: "#/components/schemas/AppUpdatePolicy"
        engagementPolicy:
          $ref: "#/components/schemas/EngagementPolicy"
        quota:
          $ref: "#/components/schemas/Quota"
        today:
          $ref: "#/components/schemas/TodayJournalResponse"
        weeklySummary:
          $ref: "#/components/schemas/JournalRangeResponse"
        weeklyRange:
          $ref: "#/components/schemas/JournalRangeResponse"

    AppUpdatePolicy:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [current, optional, mandatory]
        platform:
          type: string
          enum: [ios, android]
        currentBuild:
          type: integer
          minimum: 0
        currentVersion:
          type: string
        latestBuild:
          type: integer
          minimum: 0
        latestVersion:
          type: string
          nullable: true
        minSupportedBuild:
          type: integer
          minimum: 0
        storeUrl:
          type: string
          format: uri
          nullable: true
        title:
          type: string
        message:
          type: string

    RegisterPushTokenRequest:
      type: object
      required: [token]
      properties:
        provider:
          type: string
          enum: [fcm]
          default: fcm
        token:
          type: string
          minLength: 16
          maxLength: 4096
          description: Firebase Cloud Messaging registration token. The API stores the token and a hash; operational logs and admin responses must not expose the raw value.
        platform:
          type: string
          enum: [ios, android]
        permissionStatus:
          type: string
          enum: [authorized, provisional, denied, not_determined, unknown]
          default: unknown

    RegisterPushTokenResponse:
      type: object
      required: [registered]
      properties:
        registered:
          type: boolean
          const: true

    AdminSendPushNotificationRequest:
      type: object
      required: [targetType, title, body, reason]
      properties:
        targetType:
          type: string
          enum: [profile, install, all_active]
        profileId:
          type: string
          format: uuid
          description: Required when `targetType` is `profile`.
        installId:
          type: string
          minLength: 1
          maxLength: 160
          description: Required when `targetType` is `install`.
        confirmAll:
          type: string
          enum: [SEND_TO_ALL]
          description: Required when `targetType` is `all_active`.
        title:
          type: string
          minLength: 3
          maxLength: 120
        body:
          type: string
          minLength: 3
          maxLength: 500
        data:
          type: object
          additionalProperties:
            type: string
            maxLength: 256
          maxProperties: 20
          description: Optional FCM data payload. Keys are sanitized before delivery.
        reason:
          type: string
          minLength: 8
          maxLength: 500

    AdminSendPushNotificationResponse:
      type: object
      required: [delivery]
      properties:
        delivery:
          type: object
          required: [attempted, sent, failed, disabledTokens, failures]
          properties:
            attempted:
              type: integer
              minimum: 0
            sent:
              type: integer
              minimum: 0
            failed:
              type: integer
              minimum: 0
            disabledTokens:
              type: integer
              minimum: 0
            failures:
              type: object
              additionalProperties:
                type: integer
                minimum: 0

    EngagementPolicyUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/EngagementPolicy"
        - type: object
          required: [reason]
          properties:
            reason:
              type: string
              minLength: 8
              maxLength: 500

    EngagementPolicy:
      type: object
      required: [analytics, reviewPrompt, interstitialAds, notifications, streaks]
      properties:
        analytics:
          $ref: "#/components/schemas/EngagementAnalyticsPolicy"
        reviewPrompt:
          $ref: "#/components/schemas/EngagementReviewPromptPolicy"
        interstitialAds:
          $ref: "#/components/schemas/EngagementInterstitialAdsPolicy"
        notifications:
          $ref: "#/components/schemas/EngagementNotificationsPolicy"
        streaks:
          $ref: "#/components/schemas/EngagementStreaksPolicy"

    EngagementAnalyticsPolicy:
      type: object
      required: [enabled, firebaseEnabled, debugLogging, sampleRatePercent, events]
      properties:
        enabled:
          type: boolean
        firebaseEnabled:
          type: boolean
        debugLogging:
          type: boolean
        sampleRatePercent:
          type: integer
          minimum: 0
          maximum: 100
        events:
          type: object
          required:
            [
              appOpen,
              bootstrapLoaded,
              tabSelected,
              scanStarted,
              scanAnalysisSucceeded,
              scanAnalysisFailed,
              scanConfirmed,
              manualMealSaved,
              mealUpdated,
              mealDeleted,
              rewardedAdStarted,
              rewardedAdEarned,
              rewardedAdFailed,
              accountGateShown,
              accountLinked,
              healthTargetSaved,
            ]
          properties:
            appOpen:
              type: boolean
            bootstrapLoaded:
              type: boolean
            tabSelected:
              type: boolean
            scanStarted:
              type: boolean
            scanAnalysisSucceeded:
              type: boolean
            scanAnalysisFailed:
              type: boolean
            scanConfirmed:
              type: boolean
            manualMealSaved:
              type: boolean
            mealUpdated:
              type: boolean
            mealDeleted:
              type: boolean
            rewardedAdStarted:
              type: boolean
            rewardedAdEarned:
              type: boolean
            rewardedAdFailed:
              type: boolean
            accountGateShown:
              type: boolean
            accountLinked:
              type: boolean
            healthTargetSaved:
              type: boolean

    EngagementReviewPromptPolicy:
      type: object
      required:
        [
          enabled,
          minConfirmedScans,
          minActiveDays,
          cooldownDays,
          oncePerAppVersion,
          storeUrls,
          copy,
        ]
      properties:
        enabled:
          type: boolean
        minConfirmedScans:
          type: integer
          minimum: 0
          maximum: 1000
        minActiveDays:
          type: integer
          minimum: 0
          maximum: 365
        cooldownDays:
          type: integer
          minimum: 1
          maximum: 365
        oncePerAppVersion:
          type: boolean
        storeUrls:
          type: object
          required: [ios, android]
          properties:
            ios:
              type: string
              format: uri
              nullable: true
            android:
              type: string
              format: uri
              nullable: true
        copy:
          type: object
          required: [title, body, positiveLabel, negativeLabel]
          properties:
            title:
              type: string
              minLength: 3
              maxLength: 120
            body:
              type: string
              minLength: 3
              maxLength: 500
            positiveLabel:
              type: string
              minLength: 1
              maxLength: 80
            negativeLabel:
              type: string
              minLength: 1
              maxLength: 80

    EngagementInterstitialAdsPolicy:
      type: object
      required:
        [
          enabled,
          freeUsersOnly,
          premiumExcluded,
          minConfirmedScansBeforeFirstAd,
          scansBetweenAds,
          cooldownMinutes,
          dailyCap,
          adUnitIds,
        ]
      properties:
        enabled:
          type: boolean
        freeUsersOnly:
          type: boolean
        premiumExcluded:
          type: boolean
        minConfirmedScansBeforeFirstAd:
          type: integer
          minimum: 0
          maximum: 1000
        scansBetweenAds:
          type: integer
          minimum: 1
          maximum: 1000
        cooldownMinutes:
          type: integer
          minimum: 0
          maximum: 1440
        dailyCap:
          type: integer
          minimum: 0
          maximum: 100
        adUnitIds:
          type: object
          required: [ios, android]
          properties:
            ios:
              type: string
              nullable: true
              maxLength: 160
            android:
              type: string
              nullable: true
              maxLength: 160

    EngagementNotificationsPolicy:
      type: object
      required: [enabled, dailyCap, quietHours, scenarios]
      properties:
        enabled:
          type: boolean
        dailyCap:
          type: integer
          minimum: 0
          maximum: 10
        quietHours:
          type: object
          required: [start, end]
          properties:
            start:
              type: string
              pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
            end:
              type: string
              pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
        scenarios:
          type: object
          required: [breakfast, lunch, snack, dinner, targetSetup]
          properties:
            breakfast:
              $ref: "#/components/schemas/EngagementNotificationScenarioPolicy"
            lunch:
              $ref: "#/components/schemas/EngagementNotificationScenarioPolicy"
            snack:
              $ref: "#/components/schemas/EngagementNotificationScenarioPolicy"
            dinner:
              $ref: "#/components/schemas/EngagementNotificationScenarioPolicy"
            targetSetup:
              $ref: "#/components/schemas/EngagementNotificationScenarioPolicy"

    EngagementNotificationScenarioPolicy:
      type: object
      required:
        [enabled, windowStart, windowEnd, title, body, requiresTarget, onlyIfTargetNotReached]
      properties:
        enabled:
          type: boolean
        windowStart:
          type: string
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
        windowEnd:
          type: string
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
        secondWindowStart:
          type: string
          nullable: true
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          description: Optional secondary reminder window. Only target setup currently uses this.
        secondWindowEnd:
          type: string
          nullable: true
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          description: Optional secondary reminder window. Only target setup currently uses this.
        title:
          type: string
          minLength: 3
          maxLength: 120
        body:
          type: string
          minLength: 3
          maxLength: 500
        requiresTarget:
          type: boolean
        onlyIfTargetNotReached:
          type: boolean

    EngagementStreaksPolicy:
      type: object
      required: [enabled, milestones, scanRewards]
      properties:
        enabled:
          type: boolean
        milestones:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/EngagementStreakMilestone"
        scanRewards:
          type: object
          required: [enabled]
          properties:
            enabled:
              type: boolean

    EngagementStreakMilestone:
      type: object
      required: [days, title, body, scanRewardAmount]
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 3650
        title:
          type: string
          minLength: 3
          maxLength: 120
        body:
          type: string
          minLength: 3
          maxLength: 500
        scanRewardAmount:
          type: integer
          minimum: 0
          maximum: 100

    SimpleError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ErrorWithMessage:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string

    ScheduledPushReminderSummary:
      type: object
      required:
        [
          runId,
          dryRun,
          scannedProfiles,
          eligibleProfiles,
          attemptedProfiles,
          sentProfiles,
          failedProfiles,
          targetTokens,
          sentTokens,
          failedTokens,
          disabledTokens,
          skipped,
          scenarios,
        ]
      properties:
        runId:
          type: string
          nullable: true
        dryRun:
          type: boolean
        scannedProfiles:
          type: integer
        eligibleProfiles:
          type: integer
        attemptedProfiles:
          type: integer
        sentProfiles:
          type: integer
        failedProfiles:
          type: integer
        targetTokens:
          type: integer
        sentTokens:
          type: integer
        failedTokens:
          type: integer
        disabledTokens:
          type: integer
        skipped:
          type: object
          additionalProperties:
            type: integer
        scenarios:
          type: object
          required: [breakfast, lunch, snack, dinner, targetSetup]
          properties:
            breakfast:
              type: integer
            lunch:
              type: integer
            snack:
              type: integer
            dinner:
              type: integer
            targetSetup:
              type: integer

    ValidationIssue:
      type: object
      additionalProperties: true

    ValidationError:
      type: object
      required: [error, issues]
      properties:
        error:
          type: string
        issues:
          type: array
          items:
            $ref: "#/components/schemas/ValidationIssue"

    ScanCreditRequiredError:
      type: object
      required: [error, reason, quota]
      properties:
        error:
          type: string
          const: scan_credit_required
        reason:
          type: string
          enum: [needs_rewarded_ad, exhausted]
        quota:
          $ref: "#/components/schemas/Quota"

    AiProviderError:
      type: object
      required: [error, message, retryable]
      properties:
        error:
          type: string
        message:
          type: string
        retryable:
          type: boolean
